services:
  opencode:
    build:
      context: ${DEVENV_DIR}
      dockerfile: Dockerfile
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - ${PWD}:/workspace
      - ${DEVENV_DIR}/opencode.json:/workspace/opencode.json:ro   # ← mount your personal config
      - opencode-config:/home/user/.config/opencode
      - uv-cache:/home/user/.cache/uv
      - uv-python:/home/user/.local/share/uv/python
      - workspace-venv:/workspace/.venv
volumes:
  opencode-config:
  uv-cache:
  uv-python:
  workspace-venv: