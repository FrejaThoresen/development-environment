# ═══════════════════════════════════════════════════════════════
# TMUX CONFIG — Vim/LazyVim-style keybindings
# Place at ~/.config/tmux/tmux.conf
# ═══════════════════════════════════════════════════════════════

# ── Copy Mode (Vim-style) ───────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# ── General Settings ───────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on

# ── Terminal & Colors ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,\*:RGB"

# ── Reload Config ───────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded!"

# ── Plugins (TPM) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Theme: tmux-colorful ───────────────────────────────────────
# Monokai-ish palette from coolors.co:
#   #30362f (dark green-black)  → background
#   #625834 (olive)             → secondary
#   #a59132 (gold)              → accents
#   #fffbdb (cream)             → text/highlights
#   #da7422 (orange)            → active/alerts
set -g @plugin 'iggredible/tmux-colorful'
set -g @tmux_colorful_color_scheme 'https://coolors.co/30362f-625834-a59132-fffbdb-da7422'

# ── Initialize TPM (MUST be the last line!) ───────────────────
run '~/.config/tmux/plugins/tpm/tpm'