# ═══════════════════════════════════════════════════════════════
# TMUX CONFIG — Vim/LazyVim-style keybindings
# Symlinked by install_script.sh to ~/.tmux.conf
# ═══════════════════════════════════════════════════════════════

# ── Copy Mode (Vim-style) ───────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
# copy-selection + set-clipboard (below) = tmux emits OSC 52, so the copy
# lands in the LOCAL clipboard even from a headless VM over SSH.
# (previously piped to xclip, which needs an X server and fails on VMs)
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Let tmux (and nvim inside it) set the terminal clipboard via OSC 52
set -s set-clipboard on

# ── General Settings ───────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on

# ── Terminal & Colors ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,\*:RGB"

# ── Reload Config ───────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display-message "tmux config reloaded!"

# ── Image rendering (kitty graphics protocol / image.nvim) ─────
# FIX: previous version had `tmux set -g allow-passthrough on`, which is
# invalid inside a conf file — passthrough was never enabled, so no images.
set -gq allow-passthrough on
set -g visual-activity off

# ── Plugins (TPM) ──────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Initialize TPM (MUST be the last line!) ───────────────────
# FIX: install_script.sh clones TPM to ~/.tmux/plugins/tpm — the old path
# (~/.config/tmux/plugins/tpm) didn't exist, so TPM never loaded.
run '~/.tmux/plugins/tpm/tpm'