# ═══════════════════════════════════════════════════════════════
# TMUX CONFIG — Vim/LazyVim-style keybindings
# Place at ~/.tmux.conf
# ═══════════════════════════════════════════════════════════════

# ── Copy Mode (Vim-style) ───────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# ── General Settings ───────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0          # Critical for nvim — removes esc delay
set -g base-index 1            # Windows numbered from 1
setw -g pane-base-index 1     # Panes numbered from 1
set -g renumber-windows on     # Close window 2 → window 3 becomes 2
set -g focus-events on         # nvim detects focus changes

# ── Terminal & Colors ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:RGB"

# ── Status Bar ──────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ── Pane Borders ────────────────────────────────────────────────
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=cyan

# ── Reload Config ───────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display-message "tmux config reloaded!"


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @plugin 'iggredible/tmux-colorful'
run-shell "/path/to/tmux/colorful.tmux"
set -g @tmux_colorful_color_scheme 'https://coolors.co/30362f-625834-a59132-fffbdb-da7422'
