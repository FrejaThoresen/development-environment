# ═══════════════════════════════════════════════════════════════
# TMUX CONFIG — Vim/LazyVim-style keybindings
# Place at ~/.tmux.conf
# ═══════════════════════════════════════════════════════════════

# ── Prefix: Ctrl+a (much easier than Ctrl+b) ──────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Pane Splitting (mirrors LazyVim: <leader>| , <leader>-) ────
# prefix | = vertical split, prefix - = horizontal split
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Navigation: prefix + h/j/k/l ───────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane Resizing: prefix + H/J/K/L (repeatable) ───────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Seamless nvim ↔ tmux navigation ─────────────────────────────
# Ctrl+h/j/k/l navigates between tmux panes AND nvim splits.
# Works because LazyVim includes vim-tmux-navigator by default.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ── Window Management ───────────────────────────────────────────
# New window inherits current directory
bind c new-window -c "#{pane_current_path}"

# Rename window (prefix + r)
bind r command-prompt -I "#W" "rename-window '%%'"

# Window navigation: Shift+h / Shift+l (like LazyVim buffer switching)
bind -n S-H previous-window
bind -n S-L next-window

# ── Copy Mode (Vim-style) ───────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"

# ── General Settings ───────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0          # Critical for nvim — removes esc delay
set -g base-index 1            # Windows numbered from 1
setw -g pane-base-index 1     # Panes numbered from 1
set -g renumber-windows on     # Close window 2 → window 3 becomes 2
set -g focus-events on         # nvim detects focus changes

# ── Terminal & Colors ──────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,*:RGB"

# ── Status Bar ──────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=white"
setw -g window-status-current-style "fg=black,bg=cyan,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ── Pane Borders ────────────────────────────────────────────────
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=cyan

# ── Reload Config ───────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display-message "tmux config reloaded!"


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

